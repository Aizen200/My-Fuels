name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend Service
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://my-fuels-backend.onrender.com/ || true
